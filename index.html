<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1e150a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Earthside">
<title>Earthside Nursery</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overflow:hidden;background:#1e150a}
body{
  font-family:'Barlow',sans-serif;
  position:fixed;inset:0;
  padding-top:env(safe-area-inset-top,0px);
  padding-bottom:env(safe-area-inset-bottom,0px);
  display:flex;flex-direction:column;
}
#app{
  max-width:430px;width:100%;margin:0 auto;
  display:flex;flex-direction:column;
  height:100%;overflow:hidden;
  background:#f2ead4;
}
/* HEADER */
#hdr{
  flex-shrink:0;
  background:#1e150a;
  border-bottom:3px solid #8c7428;
}
.hdr-top{display:flex;align-items:center;gap:10px;padding:10px 14px 0}
.hdr-logo{width:48px;height:48px;object-fit:contain;border-radius:8px;flex-shrink:0}
.hdr-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:-0.02em;color:#f2ead4;text-transform:uppercase;line-height:1}
.hdr-sub{font-size:8px;color:#c8860a;letter-spacing:2px;text-transform:uppercase}
.hdr-count{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#9b7a3a;text-transform:uppercase;letter-spacing:1px;text-align:right;line-height:1.4;margin-left:auto}
/* TABS */
#tabs{display:flex;gap:2px;padding:0 14px}
.tab-btn{
  flex:1;padding:8px 0 10px;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:#9b7a3a;background:none;border:none;cursor:pointer;
  border-bottom:3px solid transparent;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.tab-btn.active{color:#c8860a;border-bottom-color:#c8860a}
/* PAGES */
#pages{flex:1;min-height:0;overflow:hidden;position:relative}
.page{
  position:absolute;inset:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px;
  display:none;
}
.page.active{display:block}
/* INPUTS */
input,select{
  font-family:'Barlow',sans-serif;font-size:16px;
  background:#e9ddb8;border:2px solid #b5993a;border-radius:8px;
  color:#2c1f0e;padding:10px 12px;width:100%;outline:none;
  -webkit-appearance:none;appearance:none;
}
input:focus,select:focus{border-color:#c8860a;box-shadow:0 0 0 3px #c8860a33}
/* CARDS */
.card{
  background:#e9ddb8;border:2px solid #b5993a;border-radius:10px;
  margin-bottom:10px;overflow:hidden;
  box-shadow:2px 3px 0 #b5993a44;
}
.card-row{
  display:flex;align-items:center;padding:12px 14px;gap:10px;
  cursor:pointer;background:none;border:none;width:100%;text-align:left;
}
.card-icon{
  width:42px;height:42px;border-radius:8px;flex-shrink:0;
  background:#dfd1a0;border:2px solid #b5993a;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.card-icon.sm{width:38px;height:38px;font-size:18px}
.plant-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#2c1f0e;text-transform:uppercase;line-height:1.2}
.plant-name.sm{font-size:16px}
.card-meta{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
.pill{font-size:10px;background:#dfd1a0;border-radius:4px;padding:1px 6px;color:#6b5020;border:1px solid #d4b86a;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase}
.pill.gold{color:#c8860a;font-weight:700}
.qty-num{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;min-width:32px;text-align:right;line-height:1}
.chevron{font-size:12px;color:#9b7a3a;transition:.2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
/* DETAIL GRID */
.detail{padding:12px 14px 14px;background:#dfd1a0;border-top:2px solid #b5993a;display:none}
.detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 10px;margin-bottom:10px}
.detail-row{font-size:11px;line-height:1.5}
.detail-label{color:#9b7a3a;font-weight:700;text-transform:uppercase;font-size:9px;letter-spacing:.5px}
.detail-notes{font-size:11px;color:#6b5020;font-style:italic;line-height:1.6;border-top:1px solid #d4b86a;padding-top:8px}
/* EMPTY STATE */
.empty{text-align:center;padding:50px 20px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;color:#2c1f0e;margin-bottom:6px}
.empty-sub{font-size:13px;color:#6b5020}
/* ADJUST DROPDOWN */
#adj-drop{
  position:relative;left:0;right:0;
  background:#e9ddb8;border:2px solid #b5993a;border-radius:8px;
  z-index:500;overflow:hidden;max-height:280px;overflow-y:auto;
  box-shadow:0 8px 24px #00000044;display:none;
  margin-top:-10px;margin-bottom:10px;
}
#adj-drop.open{display:block}
.drop-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #d4b86a;cursor:pointer;background:none;border-right:none;border-left:none;border-top:none;width:100%;text-align:left}
.drop-item:last-child{border-bottom:none}
.drop-item:active{background:#dfd1a0}
.drop-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#2c1f0e;text-transform:uppercase}
.drop-latin{font-size:10px;color:#6b5020;font-style:italic}
/* SELECTED PLANT CARD */
.sel-hdr{padding:12px 14px;border-bottom:2px solid #b5993a;display:flex;align-items:center;gap:10px;background:#dfd1a0}
.sel-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:#2c1f0e;text-transform:uppercase}
.sel-latin{font-size:10px;color:#6b5020;font-style:italic;margin-top:2px}
/* STOCK ENTRY ROWS */
.entry-row{display:flex;align-items:center;padding:11px 14px;gap:8px;border-bottom:1px solid #d4b86a}
.entry-row:last-child{border-bottom:none}
.entry-qty{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:900}
/* EDIT FORM */
.edit-form{padding:14px;background:#dfd1a0}
.field-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.field-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;color:#6b5020;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.new-qty-preview{font-size:11px;color:#6b5020;margin-bottom:10px;font-family:'Barlow Condensed',sans-serif}
.btn-row{display:flex;gap:8px}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;padding:9px 0;border-radius:8px;border:2px solid #b5993a;background:#e9ddb8;color:#6b5020;width:100%}
.btn.primary{background:#4a7c2f;border-color:#4a7c2f;color:#f2ead4}
.btn.danger-sm{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;padding:5px 10px;color:#8c2020;background:none;border:1px solid #8c202044;border-radius:6px}
.btn.sm{padding:5px 12px;font-size:11px;width:auto}
/* ADD BUTTON */
.add-btn{
  width:100%;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;cursor:pointer;border-radius:10px;
  border:2px dashed #b5993a;background:transparent;color:#6b5020;margin-top:2px;
}
/* NEW ENTRY FORM */
.new-form-hdr{padding:8px 14px;background:#1e150a;border-bottom:2px solid #8c7428}
.new-form-hdr-txt{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#f2ead4}
.new-form-body{padding:14px}
/* PILL BAR */
.pill-bar{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;margin-bottom:8px;scrollbar-width:none}
.pill-bar::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:5px 10px;border-radius:6px;cursor:pointer;border:1.5px solid #b5993a;background:transparent;color:#6b5020}
.cat-pill.active{border:none}
/* FOOTER COUNT */
.lib-count{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#9b7a3a;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
</style>
</head>

  // ── GROUNDCOVERS (Food Forest) ──

  {id:130,name:"Lingonberry",cat:"Groundcover",latin:"Vaccinium vitis-idaea",soil:"Moist, acidic, well-drained",sun:"Part shade to full sun",water:"Moderate",zone:"2–6",height:"6–12 in",bloom:"Spring",land:"Woodland ground cover, food forest floor",notes:"Tart red berries. Very cold hardy. Evergreen."},
  {id:131,name:"Wild Strawberry",cat:"Groundcover",latin:"Fragaria virginiana",soil:"Well-drained, average",sun:"Full sun to part shade",water:"Moderate",zone:"3–8",height:"4–6 in",bloom:"Spring",land:"Ground cover, food forest floor, native",notes:"Native. Small intensely sweet berries. Spreads by runners."},
  {id:132,name:"Wintergreen",cat:"Groundcover",latin:"Gaultheria procumbens",soil:"Moist, acidic, well-drained",sun:"Part–full shade",water:"Moderate",zone:"3–7",height:"3–6 in",bloom:"Summer",land:"Woodland ground cover, native garden",notes:"Native. Evergreen. Wintergreen-scented leaves and red edible berries in winter."},
  // ── VINES (Food Forest) ──
  {id:133,name:"Arctic Kiwi",cat:"Vine",latin:"Actinidia kolomikta",soil:"Well-drained, fertile",sun:"Full sun to part shade",water:"Moderate",zone:"3–8",height:"10–15 ft",bloom:"Spring",land:"Trellis, food forest, pergola",notes:"Very cold hardy. Grape-sized edible fruits. Pink and white variegated leaves."},

  {id:138,name:"Red Kiwi",cat:"Vine",latin:"Actinidia melanandra",soil:"Well-drained, fertile",sun:"Full sun to part shade",water:"Moderate",zone:"5–8",height:"15–20 ft",bloom:"Spring",land:"Trellis, food forest, pergola",notes:"Red-skinned kiwi fruit. Rare in cultivation."},
  {id:139,name:"Schisandra",cat:"Vine",latin:"Schisandra chinensis",soil:"Moist, well-drained, slightly acidic",sun:"Part shade",water:"Moderate",zone:"4–8",height:"15–25 ft",bloom:"Spring",land:"Trellis, food forest, woodland edge",notes:"Five-flavor berry (wu wei zi). Medicinal and edible red berries. Needs male and female."},
  // ── GRASSES / SEDGES ──

  {id:148,name:"Switchgrass",cat:"Grasses/Sedges",latin:"Panicum virgatum",soil:"Adaptable – wet to dry",sun:"Full sun",water:"Low–moderate",zone:"5–9",height:"3–6 ft",bloom:"Summer",land:"Prairie, naturalized area, border",notes:"Native grass with airy seed heads and great fall color."},
  {id:149,name:"Virginia Wild Rye",cat:"Grasses/Sedges",latin:"Elymus virginicus",soil:"Moist, average to rich",sun:"Part shade to full sun",water:"Moderate",zone:"3–8",height:"2–4 ft",bloom:"Summer",land:"Woodland edge, streamside, native border",notes:"Native. Short-awned nodding seed heads. Good for streamside stabilization."},
  // ── SEMI-AQUATIC ──

  {id:155,name:"Sweet Flag",cat:"Semi-Aquatic",latin:"Acorus americanus",soil:"Wet to moist",sun:"Full sun to part shade",water:"Aquatic–high",zone:"4–9",height:"18–36 in",bloom:"Spring–summer",land:"Pond edge, rain garden, bog garden",notes:"Native. Fragrant leaves when crushed. Used medicinally. Sword-like foliage."},
  // ── PERENNIALS (ornamental) ──

  {id:158,name:"Astilbe",cat:"Perennial",latin:"Astilbe spp.",soil:"Moist, rich, slightly acidic",sun:"Part shade",water:"Moderate–high",zone:"4–8",height:"1–4 ft",bloom:"Summer",land:"Shade garden, bog edge",notes:"Feathery plumes. Needs consistent moisture."},
  {id:159,name:"Russian Sage",cat:"Perennial",latin:"Perovskia atriplicifolia",soil:"Poor, dry, well-drained",sun:"Full sun",water:"Very low",zone:"5–9",height:"3–5 ft",bloom:"Summer–fall",land:"Border, xeriscape, rock garden",notes:"Silvery stems with lavender-blue spikes. Deer and drought resistant."},
  {id:160,name:"Sedum Autumn Joy",cat:"Perennial",latin:"Hylotelephium 'Herbstfreude'",soil:"Well-drained, average to poor",sun:"Full sun",water:"Low",zone:"3–9",height:"18–24 in",bloom:"Late summer–fall",land:"Border, rock garden, container",notes:"Flat-topped pink-to-rust blooms. Excellent winter structure."},
  {id:161,name:"Catmint",cat:"Perennial",latin:"Nepeta × faassenii",soil:"Well-drained, poor to average",sun:"Full sun",water:"Very low",zone:"4–8",height:"12–18 in",bloom:"Spring–fall",land:"Border, edging, rock garden",notes:"Long-blooming blue-violet. Cut back after first flush to rebloom."},
  {id:162,name:"Coreopsis",cat:"Perennial",latin:"Coreopsis verticillata",soil:"Well-drained, poor to average",sun:"Full sun",water:"Very low",zone:"3–9",height:"1–2 ft",bloom:"Summer–fall",land:"Border, slope, naturalized area",notes:"Bright yellow daisy flowers. Very drought tolerant."},

  {id:165,name:"Bee Balm",cat:"Perennial",latin:"Monarda didyma",soil:"Rich, moist, well-drained",sun:"Full sun to part shade",water:"Moderate",zone:"4–9",height:"2–4 ft",bloom:"Summer",land:"Cottage garden, border, pollinator",notes:"Native. Attracts hummingbirds and bees."},
  {id:166,name:"Delphinium",cat:"Perennial",latin:"Delphinium elatum",soil:"Rich, moist, well-drained, alkaline",sun:"Full sun",water:"Moderate–high",zone:"3–7",height:"4–7 ft",bloom:"Early summer",land:"Cottage garden, border, cutting",notes:"Dramatic tall spikes. Stake in windy areas."},
  {id:167,name:"Coral Bells",cat:"Perennial",latin:"Heuchera spp.",soil:"Moist, well-drained, rich",sun:"Part–full shade",water:"Moderate",zone:"4–9",height:"8–18 in",bloom:"Late spring–summer",land:"Shade garden, border, container",notes:"Colorful foliage in purple, bronze, green."},

const CAT_COLORS = {
  "Perennial":{bg:"#4a7c2f",lt:"#d4edb8"},"Shrub":{bg:"#7c5a2f",lt:"#edd4a8"},
  "Tree":{bg:"#2f5c3a",lt:"#a8d4b4"},"Grass":{bg:"#6b7c2f",lt:"#d4e8a8"},
  "Fern":{bg:"#2f7c5a",lt:"#a8e8cc"},"Vine":{bg:"#5a2f7c",lt:"#cca8e8"},
  "Ground Cover":{bg:"#2f7c7c",lt:"#a8e8e8"},"Annual":{bg:"#7c2f5a",lt:"#e8a8cc"},
  "Bulb":{bg:"#4a2f7c",lt:"#bba8e8"},"Houseplant":{bg:"#2f5a7c",lt:"#a8cce8"},
  "Fruit":{bg:"#7c3a2f",lt:"#e8b4a8"},"Vegetable":{bg:"#3a7c2f",lt:"#b4e8a8"},
  "Herb":{bg:"#7c6b2f",lt:"#e8d4a8"},"Succulent":{bg:"#2f7c6b",lt:"#a8e8d4"},
  "Cactus":{bg:"#7c5a2f",lt:"#e8cca8"},"Food Forest":{bg:"#3a5c2f",lt:"#b8d4a8"},
  "Herbaceous":{bg:"#4a7c4a",lt:"#b8e8b8"},"Semi-Aquatic":{bg:"#2f4a7c",lt:"#a8b8e8"},
  "Groundcover":{bg:"#2f7c6b",lt:"#a8e8d4"},"Grasses/Sedges":{bg:"#6b7c3a",lt:"#d4e8b0"},
  "Small Tree":{bg:"#3a6b2f",lt:"#b4d4a8"},"Canopy":{bg:"#2f5c2f",lt:"#a8cca8"},
};
const CAT_ICON = {
  "Perennial":"🌸","Shrub":"🌿","Tree":"🌳","Grass":"🌾","Fern":"🌿",
  "Vine":"🍃","Ground Cover":"🍀","Annual":"🌼","Bulb":"🧅","Houseplant":"🪴",
  "Fruit":"🍎","Vegetable":"🥦","Herb":"🌿","Succulent":"🌵","Cactus":"🌵",
  "Food Forest":"🌲","Herbaceous":"🌱","Semi-Aquatic":"💧","Groundcover":"🍀",
  "Grasses/Sedges":"🌾","Small Tree":"🌳","Canopy":"🌲",
};
const POT_SIZES = ['4"','6"','1 gal','2 gal','3 gal','5 gal','7 gal','10 gal','15 gal','25 gal','B&B','Bare root','Plug'];
const ALL_CATS = [...new Set(PLANTS.map(p=>p.cat))];

// ── State ──────────────────────────────────────────────
let stock = [];   // [{id, plantId, potSize, price, qty}]
let nid = 1;
let openCards = {};       // key -> bool
let selPlant = null;      // currently selected plant in Adjust
let editingEntryId = null;
let showAddForm = false;
let libCat = 'All';
let adjDropOpen = false;

// ── Helpers ────────────────────────────────────────────
function getIcon(cat){ return CAT_ICON[cat]||'🌿'; }
function badge(cat){
  const c=CAT_COLORS[cat]||{bg:'#4a7c2f',lt:'#d4edb8'};
  return `<span class="badge" style="background:${c.bg};color:${c.lt}">${cat}</span>`;
}
function qColor(n){ return n===0?'#8c2020':n<=5?'#8c5c00':'#2a6020'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function detailHTML(p){
  return `<div class="detail-grid">
    <div class="detail-row"><span class="detail-label">Latin: </span><em>${esc(p.latin)}</em></div>
    <div class="detail-row"><span class="detail-label">Zone: </span>${esc(p.zone)}</div>
    <div class="detail-row"><span class="detail-label">Soil: </span>${esc(p.soil)}</div>
    <div class="detail-row"><span class="detail-label">Sun: </span>${esc(p.sun)}</div>
    <div class="detail-row"><span class="detail-label">Water: </span>${esc(p.water)}</div>
    <div class="detail-row"><span class="detail-label">Height: </span>${esc(p.height)}</div>
    <div class="detail-row"><span class="detail-label">Bloom: </span>${esc(p.bloom)}</div>
    <div class="detail-row"><span class="detail-label">Land: </span>${esc(p.land)}</div>
  </div>
  <div class="detail-notes">${esc(p.notes)}</div>`;
}

// ── Tab switching ──────────────────────────────────────
function switchTab(tab, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  btn.classList.add('active');
  // Scroll to top of new page
  document.getElementById('page-'+tab).scrollTop = 0;
  if(tab==='stock') renderStock();
  if(tab==='library') renderLib();
}

// ── STOCK ─────────────────────────────────────────────
function renderStock(){
  const q = (document.getElementById('stock-search').value||'').toLowerCase();
  const list = document.getElementById('stock-list');
  const filtered = stock.filter(s=>{
    if(!q) return true;
    const p = PLANTS.find(x=>x.id===s.plantId);
    return p&&(p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)||p.latin.toLowerCase().includes(q));
  });
  if(!stock.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🪴</div><div class="empty-title">Stock Empty</div><div class="empty-sub">Use the Adjust tab to add plants.</div></div>`;
    return;
  }
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><div class="empty-sub">No plants match your search.</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(s=>{
    const p = PLANTS.find(x=>x.id===s.plantId);
    if(!p) return '';
    const k=`s${s.id}`;
    const isOpen=openCards[k];
    return `<div class="card">
      <button class="card-row" onclick="toggleCard('${k}')">
        <div class="card-icon">${getIcon(p.cat)}</div>
        <div style="flex:1;min-width:0">
          <div class="plant-name">${esc(p.name)}</div>
          <div class="card-meta">${badge(p.cat)}<span class="pill">${esc(s.potSize)}</span><span class="pill gold">$${s.price.toFixed(2)}</span></div>
        </div>
        <div class="qty-num" style="color:${qColor(s.qty)}">${s.qty}</div>
        <div class="chevron${isOpen?' open':''}">▾</div>
      </button>
      <div class="detail${isOpen?' open':''}">${detailHTML(p)}</div>
    </div>`;
  }).join('');
  // footer
  const total = filtered.reduce((a,s)=>a+s.qty,0);
  list.innerHTML += `<div style="text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#9b7a3a;text-transform:uppercase;letter-spacing:1px;margin-top:4px">${filtered.length} SKU${filtered.length!==1?'s':''} · ${total} units</div>`;
}

function toggleCard(k){
  openCards[k]=!openCards[k];
  const curTab = document.querySelector('.page.active').id;
  if(curTab==='page-stock') renderStock();
  else if(curTab==='page-library') renderLib();
}

// ── ADJUST ────────────────────────────────────────────
function adjSearch(){
  const q = (document.getElementById('adj-search').value||'').toLowerCase().trim();
  const drop = document.getElementById('adj-drop');
  if(!q){ drop.innerHTML=''; drop.classList.remove('open'); return; }
  const results = PLANTS.filter(p=>p.name.toLowerCase().includes(q)||p.latin.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)).slice(0,12);
  if(!results.length){ drop.innerHTML=''; drop.classList.remove('open'); return; }
  drop.innerHTML = results.map(p=>`
    <button class="drop-item" onmousedown="selectPlant(${p.id})">
      <span style="font-size:18px">${getIcon(p.cat)}</span>
      <div style="flex:1">
        <div class="drop-name">${esc(p.name)}</div>
        <div class="drop-latin">${esc(p.latin)}</div>
      </div>
      ${badge(p.cat)}
    </button>`).join('');
  drop.classList.add('open');
}

function selectPlant(id){
  selPlant = PLANTS.find(p=>p.id===id);
  editingEntryId = null;
  showAddForm = false;
  document.getElementById('adj-search').value = selPlant.name;
  document.getElementById('adj-drop').classList.remove('open');
  renderAdjust();
}

function renderAdjust(){
  const emptySub = document.getElementById('adj-empty-sub');
  if(emptySub) emptySub.textContent = `Search any of the ${PLANTS.length} plants to adjust inventory.`;
  if(!selPlant){ return; }
  const p = selPlant;
  const entries = stock.filter(s=>s.plantId===p.id);

  let entriesHTML = entries.map((s,i)=>{
    if(editingEntryId===s.id){
      return `<div class="edit-form">
        <div class="field-grid">
          <div><div class="field-label">Pot size</div>
            <select id="ep-pot" style="font-size:14px;padding:8px 10px">${POT_SIZES.map(ps=>`<option${ps===s.potSize?' selected':''}>${esc(ps)}</option>`).join('')}</select>
          </div>
          <div><div class="field-label">Price ($)</div>
            <input id="ep-price" type="number" step="0.01" value="${s.price.toFixed(2)}" style="font-size:14px;padding:8px 10px" oninput="previewQty(${s.id},${s.qty})">
          </div>
          <div><div class="field-label">Qty ±</div>
            <input id="ep-delta" type="number" value="0" style="font-size:14px;padding:8px 10px" oninput="previewQty(${s.id},${s.qty})">
          </div>
        </div>
        <div class="new-qty-preview" id="ep-preview">New qty: <strong style="color:${qColor(s.qty)};font-size:16px">${s.qty}</strong> (was ${s.qty})</div>
        <div class="btn-row">
          <button class="btn primary" style="flex:2" onclick="saveEdit(${s.id},${s.qty})">Save</button>
          <button class="btn" style="flex:1" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>`;
    }
    return `<div class="entry-row${i<entries.length-1?'':''}" style="border-bottom:${i<entries.length-1?'1px solid #d4b86a':'none'}">
      <div style="flex:1;display:flex;gap:5px;flex-wrap:wrap;align-items:center">
        <span class="pill">${esc(s.potSize)}</span>
        <span class="pill gold">$${s.price.toFixed(2)}</span>
        <span class="entry-qty" style="color:${qColor(s.qty)}">${s.qty} in stock</span>
      </div>
      <button class="btn sm" onclick="startEdit(${s.id})">Edit</button>
      <button class="danger-sm" onclick="deleteEntry(${s.id})">✕</button>
    </div>`;
  }).join('');

  let addFormHTML = '';
  if(showAddForm){
    addFormHTML = `<div class="card" style="margin-top:0">
      <div class="new-form-hdr"><div class="new-form-hdr-txt">New Stock Entry — ${esc(p.name)}</div></div>
      <div class="new-form-body">
        <div class="field-grid">
          <div><div class="field-label">Pot size</div>
            <select id="np-pot" style="font-size:14px;padding:8px 10px">${POT_SIZES.map(ps=>`<option>${esc(ps)}</option>`).join('')}</select>
          </div>
          <div><div class="field-label">Price ($)</div>
            <input id="np-price" type="number" step="0.01" placeholder="0.00" style="font-size:14px;padding:8px 10px">
          </div>
          <div><div class="field-label">Starting qty</div>
            <input id="np-qty" type="number" value="0" style="font-size:14px;padding:8px 10px">
          </div>
        </div>
        <div class="btn-row">
          <button class="btn primary" style="flex:2" onclick="addEntry()">Add to Stock</button>
          <button class="btn" style="flex:1" onclick="cancelAdd()">Cancel</button>
        </div>
      </div>
    </div>`;
  } else {
    addFormHTML = `<button class="add-btn" id="show-add-btn">+ Add New ${esc(p.name)} Entry</button>`;
  }

  document.getElementById('adj-content').innerHTML = `
    <div class="card" style="margin-bottom:12px">
      <div class="sel-hdr">
        <div class="card-icon" style="width:44px;height:44px;font-size:22px;background:#f2ead4">${getIcon(p.cat)}</div>
        <div style="flex:1">
          <div class="sel-name">${esc(p.name)}</div>
          <div class="sel-latin">${esc(p.latin)}</div>
          <div style="margin-top:5px">${badge(p.cat)}</div>
        </div>
      </div>
      ${entries.length?entriesHTML:`<div style="padding:14px 16px;font-size:12px;color:#6b5020">No stock entries yet for this plant.</div>`}
    </div>
    ${addFormHTML}`;


}

function previewQty(id, origQty){
  const delta = parseInt(document.getElementById('ep-delta')?.value)||0;
  const newQty = Math.max(0, origQty + delta);
  const prev = document.getElementById('ep-preview');
  if(prev) prev.innerHTML = `New qty: <strong style="color:${qColor(newQty)};font-size:16px">${newQty}</strong> <span style="opacity:.6">(was ${origQty})</span>`;
}

function startEdit(id){
  editingEntryId = id;
  showAddForm = false;
  renderAdjust();
}
function cancelEdit(){ editingEntryId=null; renderAdjust(); }

function saveEdit(id, origQty){
  const delta = parseInt(document.getElementById('ep-delta')?.value)||0;
  const price = parseFloat(document.getElementById('ep-price')?.value)||0;
  const pot = document.getElementById('ep-pot')?.value||'1 gal';
  stock = stock.map(s=>s.id!==id?s:{...s,qty:Math.max(0,origQty+delta),price,potSize:pot});
  editingEntryId = null;
  renderAdjust();
  renderStock();
}

function deleteEntry(id){
  stock = stock.filter(s=>s.id!==id);
  renderAdjust();
  renderStock();
}

function showAdd(){ showAddForm=true; editingEntryId=null; renderAdjust(); }
function cancelAdd(){ showAddForm=false; renderAdjust(); }

function addEntry(){
  const price = parseFloat(document.getElementById('np-price')?.value)||0;
  const qty = parseInt(document.getElementById('np-qty')?.value)||0;
  const pot = document.getElementById('np-pot')?.value||'1 gal';
  if(!selPlant) return;
  stock.push({id:nid++, plantId:selPlant.id, potSize:pot, price, qty});
  showAddForm=false;
  renderAdjust();
  renderStock();
}

// ── LIBRARY ───────────────────────────────────────────
function renderLib(){
  const q = (document.getElementById('lib-search').value||'').toLowerCase();
  const filtered = PLANTS.filter(p=>(libCat==='All'||p.cat===libCat)&&(!q||p.name.toLowerCase().includes(q)||p.latin.toLowerCase().includes(q)||p.soil.toLowerCase().includes(q)||p.land.toLowerCase().includes(q)));

  // Pills
  const pb = document.getElementById('pill-bar');
  pb.innerHTML = ['All',...ALL_CATS].map(c=>{
    const act = libCat===c;
    const col = CAT_COLORS[c]||{bg:'#4a7c2f',lt:'#c8e6a8'};
    const style = act?`background:${col.bg};color:${col.lt};border:none`:`background:transparent;color:#6b5020;border:1.5px solid #b5993a`;
    return `<button class="cat-pill${act?' active':''}" style="${style}" onclick="setLibCat('${esc(c)}')">${esc(c)}</button>`;
  }).join('');

  document.getElementById('lib-count').textContent = `${filtered.length} of ${PLANTS.length} plants`;

  document.getElementById('lib-list').innerHTML = filtered.map(p=>{
    const k=`l${p.id}`;
    const isOpen=openCards[k];
    return `<div class="card">
      <button class="card-row" onclick="toggleCard('${k}')">
        <div class="card-icon sm">${getIcon(p.cat)}</div>
        <div style="flex:1;min-width:0">
          <div class="plant-name sm">${esc(p.name)}</div>
          <div class="card-meta">${badge(p.cat)}<span style="font-size:10px;color:#9b7a3a;font-style:italic">${esc(p.latin)}</span></div>
        </div>
        <div class="chevron${isOpen?' open':''}">▾</div>
      </button>
      <div class="detail${isOpen?' open':''}">${detailHTML(p)}</div>
    </div>`;
  }).join('');
}

function setLibCat(c){
  libCat=c;
  renderLib();
}

// ── Init ──────────────────────────────────────────────
document.getElementById('plant-count-hdr').innerHTML = `${PLANTS.length}<br>plants`;
document.getElementById('adj-empty-sub').textContent = `Search any of the ${PLANTS.length} plants to adjust inventory.`;

// Close dropdown when tapping outside
document.addEventListener('click', e=>{
  const drop = document.getElementById('adj-drop');
  const input = document.getElementById('adj-search');
  if(!drop.contains(e.target)&&e.target!==input) drop.classList.remove('open');
});

renderStock();
renderLib();

// Delegated listener on stable parent - handles dynamically rendered buttons reliably on iOS
document.getElementById('adj-content').addEventListener('click', function(e){
  const btn = e.target.closest('#show-add-btn');
  if(btn) showAdd();
});

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
