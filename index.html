<style>
/* ── Reset ─────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

/* ── Root shell — fills entire screen, no bounce ───── */
html {
  height: 100%;
  background: #1e150a;
  /* Prevent double-tap zoom on iOS */
  touch-action: manipulation;
}
body {
  /* Use dvh so the viewport doesn't shrink when keyboard appears */
  height: 100dvh;
  height: 100vh; /* fallback */
  width: 100%;
  overflow: hidden;
  background: #1e150a;
  font-family: sans-serif;
  /* Push everything below the notch */
  padding-top: env(safe-area-inset-top, 0px);
  /* Prevent iOS rubber-banding on the body */
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
}

/* ── React root — column flex, full height ──────────── */
#root {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: #1e150a;
  overflow: hidden;
}

/* ── App shell — centred column, fills root ─────────── */
#app-shell {
  max-width: 430px;
  width: 100%;
  margin: 0 auto;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: #f2ead4;
  overflow: hidden;
  position: relative;
}

/* ── Sticky header stays on top ─────────────────────── */
#app-header {
  flex-shrink: 0;
  position: relative;
  z-index: 50;
}

/* ── Each tab body scrolls independently ────────────── */
.tab-body {
  flex: 1 1 0;
  min-height: 0;          /* critical — lets flex child shrink */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding: 14px;
}

/* ── Inputs stay at 16 px so iOS doesn't auto-zoom ──── */
input, select, textarea {
  font-size: 16px !important;
  touch-action: manipulation;
}
</style>

  // ── GROUNDCOVERS (Food Forest) ──

const ALL_CATS = [...new Set(PLANTS.map(p => p.cat))];
const POT_SIZES = ['4"','6"','1 gal','2 gal','3 gal','5 gal','7 gal','10 gal','15 gal','25 gal','B&B','Bare root','Plug'];

const T = {
  bg:"#f2ead4", surface:"#e9ddb8", surface2:"#dfd1a0", surface3:"#f7f0e0",
  border:"#b5993a", border2:"#8c7428", border3:"#d4b86a",
  text:"#2c1f0e", muted:"#6b5020", faint:"#9b7a3a",
  accent:"#4a7c2f", accent2:"#c8860a", red:"#8c2020", amber:"#8c5c00", green:"#2a6020",
  hdr:"#1e150a", hdrTx:"#f2ead4", hdrSub:"#c8860a",
};

function getIcon(cat){
  const m={"Perennial":"🌸","Shrub":"🌿","Tree":"🌳","Grass":"🌾","Fern":"🌿","Vine":"🍃","Ground Cover":"🍀","Annual":"🌼","Bulb":"🧅","Houseplant":"🪴","Fruit":"🍎","Vegetable":"🥦","Herb":"🌿","Succulent":"🌵","Cactus":"🌵","Food Forest":"🌲","Herbaceous":"🌱","Semi-Aquatic":"💧","Groundcover":"🍀","Grasses/Sedges":"🌾","Small Tree":"🌳","Canopy":"🌲"};
  return m[cat]||"🌿";
}

function Badge({cat}){
  const c=CAT_COLORS[cat]||{bg:"#4a7c2f",lt:"#c8e6a8"};
  return <span style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:3,background:c.bg,color:c.lt,whiteSpace:"nowrap",letterSpacing:"0.5px",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>{cat}</span>;
}

function DetailGrid({plant}){
  const rows=[["Latin",<em key="l">{plant.latin}</em>],["Zone",plant.zone],["Soil",plant.soil],["Sun",plant.sun],["Water",plant.water],["Height",plant.height],["Bloom",plant.bloom],["Land",plant.land]];
  return(
    <div style={{padding:"12px 14px 14px",background:T.surface2,borderTop:`2px solid ${T.border}`}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px 10px",marginBottom:10}}>
        {rows.map(([k,v])=>(
          <div key={k} style={{fontSize:11,lineHeight:1.5}}>
            <span style={{color:T.faint,fontWeight:700,textTransform:"uppercase",fontSize:9,letterSpacing:"0.5px"}}>{k}: </span>
            <span style={{color:T.text}}>{v}</span>
          </div>
        ))}
      </div>
      <div style={{fontSize:11,color:T.muted,fontStyle:"italic",lineHeight:1.6,borderTop:`1px solid ${T.border3}`,paddingTop:8}}>{plant.notes}</div>
    </div>
  );
}

const RB={display:"block",width:"100%",background:"none",border:"none",cursor:"pointer",textAlign:"left",padding:0,fontFamily:"inherit"};

export default function Earthside(){
  const [tab,setTab]=useState("stock");
  const [stock,setStock]=useState([]);
  const [nid,setNid]=useState(1);
  const [open,setOpen]=useState({});
  const tog=k=>setOpen(p=>({...p,[k]:!p[k]}));

  // STOCK
  const [sq,setSq]=useState("");
  const fStock=useMemo(()=>{
    const q=sq.toLowerCase();
    return stock.filter(s=>{
      if(!q)return true;
      const p=PLANTS.find(x=>x.id===s.plantId);
      return p&&(p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)||p.latin.toLowerCase().includes(q));
    });
  },[sq,stock]);

  // ADJUST
  const [aq,setAq]=useState("");
  const [adrop,setAdrop]=useState(false);
  const [sPlt,setSPlt]=useState(null);
  const [eid,setEid]=useState(null);
  const [edelta,setEdelta]=useState(0);
  const [eprice,setEprice]=useState("");
  const [epot,setEpot]=useState("");
  const [addForm,setAddForm]=useState(false);
  const [np,setNp]=useState("1 gal");
  const [nPrice,setNPrice]=useState("");
  const [nQty,setNQty]=useState(0);

  const adjRes=useMemo(()=>{
    const q=aq.toLowerCase().trim();
    if(!q)return[];
    return PLANTS.filter(p=>p.name.toLowerCase().includes(q)||p.latin.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)).slice(0,12);
  },[aq]);

  const pStock=useMemo(()=>sPlt?stock.filter(s=>s.plantId===sPlt.id):[],[sPlt,stock]);
  const startEdit=s=>{setEid(s.id);setEdelta(0);setEprice(s.price.toFixed(2));setEpot(s.potSize);setAddForm(false);};
  const saveEdit=()=>{setStock(p=>p.map(s=>s.id!==eid?s:{...s,qty:Math.max(0,s.qty+Number(edelta)),price:parseFloat(eprice)||s.price,potSize:epot}));setEid(null);};
  const addEntry=()=>{
    if(!sPlt||!nPrice)return;
    setStock(p=>[...p,{id:nid,plantId:sPlt.id,potSize:np,price:parseFloat(nPrice)||0,qty:Number(nQty)||0}]);
    setNid(n=>n+1);setAddForm(false);setNPrice("");setNQty(0);
  };
  const delEntry=id=>setStock(p=>p.filter(s=>s.id!==id));

  // LIBRARY
  const [lq,setLq]=useState("");
  const [lcat,setLcat]=useState("All");
  const fLib=useMemo(()=>{
    const q=lq.toLowerCase();
    return PLANTS.filter(p=>(lcat==="All"||p.cat===lcat)&&(!q||p.name.toLowerCase().includes(q)||p.latin.toLowerCase().includes(q)||p.soil.toLowerCase().includes(q)||p.land.toLowerCase().includes(q)));
  },[lq,lcat]);

  const qc=n=>n===0?T.red:n<=5?T.amber:T.green;

  const INP={fontFamily:"'Barlow',sans-serif",fontSize:16,background:T.surface,border:`2px solid ${T.border}`,borderRadius:8,color:T.text,padding:"10px 12px",outline:"none",width:"100%",boxSizing:"border-box"};
  const BTN=(p)=>({fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700,letterSpacing:"0.05em",textTransform:"uppercase",cursor:"pointer",padding:"9px 0",borderRadius:8,border:`2px solid ${p?T.accent:T.border}`,background:p?T.accent:T.surface,color:p?"#f2ead4":T.muted});

  return(
    <div id="app-shell" style={{fontFamily:"'Barlow',sans-serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap');
        input:focus,select:focus{border-color:${T.accent2}!important;outline:none;box-shadow:0 0 0 3px ${T.accent2}33}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:${T.border3}66;border-radius:4px}
        /* Prevent the category pill bar from triggering page scroll */
        .pill-scroll{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
        .pill-scroll::-webkit-scrollbar{display:none}
      `}</style>

      {/* ── HEADER ── */}
      <div id="app-header" style={{background:T.hdr,borderBottom:`3px solid ${T.border2}`}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px 0"}}>
          <img src={LOGO_SRC} alt="Earthside" style={{width:38,height:38,objectFit:"contain",borderRadius:6,flexShrink:0}}/>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,letterSpacing:"-0.02em",color:T.hdrTx,textTransform:"uppercase",lineHeight:1}}>Earthside</div>
            <div style={{fontSize:8,color:T.hdrSub,letterSpacing:"2px",textTransform:"uppercase"}}>Food Forests + Nursery</div>
          </div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,color:T.faint,textTransform:"uppercase",letterSpacing:"1px",textAlign:"right"}}>{PLANTS.length}<br/>plants</div>
        </div>
        <div style={{display:"flex",gap:2,padding:"0 14px"}}>
          {[["stock","📦","Stock"],["adjust","✏️","Adjust"],["library","🌱","Library"]].map(([k,icon,label])=>(
            <button key={k} onClick={()=>setTab(k)} style={{
              flex:1,padding:"8px 0 10px",
              fontFamily:"'Barlow Condensed',sans-serif",
              fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",
              color:tab===k?T.hdrSub:T.faint,
              background:"none",border:"none",cursor:"pointer",
              borderBottom:tab===k?`3px solid ${T.hdrSub}`:"3px solid transparent",
              display:"flex",flexDirection:"column",alignItems:"center",gap:2,
            }}>
              <span style={{fontSize:14}}>{icon}</span>{label}
            </button>
          ))}
        </div>
      </div>

      {/* ══ STOCK ══ */}
      {tab==="stock"&&(
        <div className="tab-body">
          <input style={INP} placeholder="Search inventory…" value={sq} onChange={e=>setSq(e.target.value)}/>
          <div style={{height:12}}/>

          {fStock.length===0&&stock.length===0&&(
            <div style={{textAlign:"center",padding:"50px 20px"}}>
              <div style={{fontSize:48,marginBottom:12}}>🪴</div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,textTransform:"uppercase",color:T.text,marginBottom:6}}>Stock Empty</div>
              <div style={{fontSize:13,color:T.muted}}>Use the Adjust tab to add plants to your inventory.</div>
            </div>
          )}
          {fStock.length===0&&stock.length>0&&(
            <div style={{textAlign:"center",padding:32,color:T.muted,fontSize:13}}>No plants match your search.</div>
          )}

          {fStock.map(s=>{
            const p=PLANTS.find(x=>x.id===s.plantId);if(!p)return null;
            const k=`s${s.id}`;const isOpen=open[k];
            return(
              <div key={s.id} style={{background:T.surface,border:`2px solid ${T.border}`,borderRadius:10,marginBottom:10,overflow:"hidden",boxShadow:`2px 3px 0 ${T.border}44`}}>
                <button style={RB} onClick={()=>tog(k)}>
                  <div style={{display:"flex",alignItems:"center",padding:"12px 14px",gap:10}}>
                    <div style={{width:42,height:42,borderRadius:8,flexShrink:0,background:T.surface2,border:`2px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{getIcon(p.cat)}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:700,color:T.text,textTransform:"uppercase",letterSpacing:"0.02em",lineHeight:1.2}}>{p.name}</div>
                      <div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                        <Badge cat={p.cat}/>
                        <span style={{fontSize:10,background:T.surface2,borderRadius:4,padding:"1px 6px",color:T.muted,border:`1px solid ${T.border3}`,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,textTransform:"uppercase"}}>{s.potSize}</span>
                        <span style={{fontSize:10,background:T.surface2,borderRadius:4,padding:"1px 6px",color:T.accent2,border:`1px solid ${T.border3}`,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>${s.price.toFixed(2)}</span>
                      </div>
                    </div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,color:qc(s.qty),minWidth:32,textAlign:"right",lineHeight:1}}>{s.qty}</div>
                    <div style={{fontSize:12,color:T.faint,transform:isOpen?"rotate(180deg)":"none",transition:"0.2s",flexShrink:0}}>▾</div>
                  </div>
                </button>
                {isOpen&&<DetailGrid plant={p}/>}
              </div>
            );
          })}
          {fStock.length>0&&(
            <div style={{textAlign:"center",fontSize:10,color:T.faint,marginTop:4,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"1px"}}>
              {fStock.length} SKU{fStock.length!==1?"s":""} · {fStock.reduce((a,s)=>a+s.qty,0)} units
            </div>
          )}
        </div>
      )}

      {/* ══ ADJUST ══ */}
      {tab==="adjust"&&(
        <div className="tab-body">
          <div style={{position:"relative",marginBottom:14}}>
            <input style={INP} placeholder={`Search all ${PLANTS.length} plants…`} value={aq}
              onChange={e=>{setAq(e.target.value);setAdrop(true);}}
              onFocus={()=>setAdrop(true)} onBlur={()=>setTimeout(()=>setAdrop(false),160)}/>
            {adrop&&adjRes.length>0&&(
              <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:T.surface,border:`2px solid ${T.border}`,borderRadius:8,zIndex:200,overflow:"hidden",maxHeight:280,overflowY:"auto",boxShadow:"0 8px 24px #00000044"}}>
                {adjRes.map(p=>(
                  <button key={p.id} style={{...RB,padding:"10px 14px",borderBottom:`1px solid ${T.border3}`}}
                    onMouseDown={()=>{setSPlt(p);setAq(p.name);setAdrop(false);setEid(null);setAddForm(false);}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:18}}>{getIcon(p.cat)}</span>
                      <div style={{flex:1}}>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700,color:T.text,textTransform:"uppercase"}}>{p.name}</div>
                        <div style={{fontSize:10,color:T.muted,fontStyle:"italic"}}>{p.latin}</div>
                      </div>
                      <Badge cat={p.cat}/>
                    </div>
                  </button>
                ))}
              </div>
            )}
          </div>

          {sPlt?(
            <div>
              <div style={{background:T.surface,border:`2px solid ${T.border}`,borderRadius:10,overflow:"hidden",marginBottom:12,boxShadow:`2px 3px 0 ${T.border}44`}}>
                <div style={{padding:"12px 14px",borderBottom:`2px solid ${T.border}`,display:"flex",alignItems:"center",gap:10,background:T.surface2}}>
                  <div style={{width:44,height:44,borderRadius:8,background:T.bg,border:`2px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{getIcon(sPlt.cat)}</div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900,color:T.text,textTransform:"uppercase"}}>{sPlt.name}</div>
                    <div style={{fontSize:10,color:T.muted,fontStyle:"italic",marginTop:2}}>{sPlt.latin}</div>
                    <div style={{marginTop:5}}><Badge cat={sPlt.cat}/></div>
                  </div>
                </div>

                {pStock.length===0&&<div style={{padding:"14px 16px",fontSize:12,color:T.muted}}>No stock entries yet for this plant.</div>}

                {pStock.map((s,i)=>(
                  <div key={s.id} style={{borderBottom:i<pStock.length-1?`1px solid ${T.border3}`:"none"}}>
                    {eid===s.id?(
                      <div style={{padding:14,background:T.surface2}}>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
                          {[
                            ["Pot size",<select key="ps" value={epot} onChange={e=>setEpot(e.target.value)} style={{...INP,fontSize:14,padding:"8px 10px"}}>{POT_SIZES.map(s=><option key={s}>{s}</option>)}</select>],
                            ["Price ($)",<input key="pr" type="number" step="0.01" value={eprice} onChange={e=>setEprice(e.target.value)} style={{...INP,fontSize:14,padding:"8px 10px"}}/>],
                            ["Qty ±",<input key="qd" type="number" value={edelta} onChange={e=>setEdelta(e.target.value)} style={{...INP,fontSize:14,padding:"8px 10px"}}/>],
                          ].map(([l,c])=>(
                            <div key={l}>
                              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:4}}>{l}</div>
                              {c}
                            </div>
                          ))}
                        </div>
                        <div style={{fontSize:11,color:T.muted,marginBottom:10,fontFamily:"'Barlow Condensed',sans-serif"}}>
                          New qty: <strong style={{color:qc(Math.max(0,s.qty+Number(edelta))),fontSize:16}}>{Math.max(0,s.qty+Number(edelta))}</strong> <span style={{opacity:0.6}}>(was {s.qty})</span>
                        </div>
                        <div style={{display:"flex",gap:8}}>
                          <button onClick={saveEdit} style={{...BTN(true),flex:2}}>Save</button>
                          <button onClick={()=>setEid(null)} style={{...BTN(false),flex:1}}>Cancel</button>
                        </div>
                      </div>
                    ):(
                      <div style={{display:"flex",alignItems:"center",padding:"11px 14px",gap:8}}>
                        <div style={{flex:1,display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,background:T.surface2,borderRadius:4,padding:"2px 7px",color:T.muted,border:`1px solid ${T.border3}`}}>{s.potSize}</span>
                          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,background:T.surface2,borderRadius:4,padding:"2px 7px",color:T.accent2,border:`1px solid ${T.border3}`}}>${s.price.toFixed(2)}</span>
                          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:900,color:qc(s.qty)}}>{s.qty} in stock</span>
                        </div>
                        <button onClick={()=>startEdit(s)} style={{...BTN(false),padding:"5px 12px",fontSize:11}}>Edit</button>
                        <button onClick={()=>delEntry(s.id)} style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer",padding:"5px 10px",color:T.red,background:"none",border:`1px solid ${T.red}44`,borderRadius:6}}>✕</button>
                      </div>
                    )}
                  </div>
                ))}
              </div>

              {!addForm?(
                <button onClick={()=>{setAddForm(true);setNp("1 gal");setNPrice("");setNQty(0);setEid(null);}}
                  style={{width:"100%",padding:12,fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,letterSpacing:"0.05em",textTransform:"uppercase",cursor:"pointer",borderRadius:10,border:`2px dashed ${T.border}`,background:"transparent",color:T.muted,boxSizing:"border-box"}}>
                  + Add New {sPlt.name} Entry
                </button>
              ):(
                <div style={{background:T.surface,border:`2px solid ${T.border}`,borderRadius:10,overflow:"hidden",boxShadow:`2px 3px 0 ${T.border}44`}}>
                  <div style={{padding:"8px 14px",background:T.hdr,borderBottom:`2px solid ${T.border2}`}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:T.hdrTx}}>New Stock Entry — {sPlt.name}</div>
                  </div>
                  <div style={{padding:14}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                      {[
                        ["Pot size",<select key="nps" value={np} onChange={e=>setNp(e.target.value)} style={{...INP,fontSize:14,padding:"8px 10px"}}>{POT_SIZES.map(s=><option key={s}>{s}</option>)}</select>],
                        ["Price ($)",<input key="npr" type="number" step="0.01" value={nPrice} onChange={e=>setNPrice(e.target.value)} placeholder="0.00" style={{...INP,fontSize:14,padding:"8px 10px"}}/>],
                        ["Starting qty",<input key="nq" type="number" value={nQty} onChange={e=>setNQty(e.target.value)} style={{...INP,fontSize:14,padding:"8px 10px"}}/>],
                      ].map(([l,c])=>(
                        <div key={l}>
                          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:4}}>{l}</div>
                          {c}
                        </div>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={addEntry} style={{...BTN(true),flex:2}}>Add to Stock</button>
                      <button onClick={()=>setAddForm(false)} style={{...BTN(false),flex:1}}>Cancel</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          ):(
            <div style={{textAlign:"center",padding:"48px 20px"}}>
              <div style={{fontSize:40,marginBottom:12}}>✏️</div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,textTransform:"uppercase",color:T.text,marginBottom:6}}>Search for a Plant</div>
              <div style={{fontSize:12,color:T.muted}}>Search any of the {PLANTS.length} plants to adjust inventory or add a new stock entry.</div>
            </div>
          )}
        </div>
      )}

      {/* ══ LIBRARY ══ */}
      {tab==="library"&&(
        <div className="tab-body">
          <input style={INP} placeholder={`Search ${PLANTS.length} plants…`} value={lq} onChange={e=>setLq(e.target.value)}/>
          <div style={{height:10}}/>

          <div className="pill-scroll">
            {["All",...ALL_CATS].map(c=>{
              const act=lcat===c;
              const col=CAT_COLORS[c]||{bg:"#4a7c2f",lt:"#c8e6a8"};
              return(
                <button key={c} onClick={()=>setLcat(c)} style={{
                  flexShrink:0,fontFamily:"'Barlow Condensed',sans-serif",
                  fontSize:10,fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",
                  padding:"5px 10px",borderRadius:6,cursor:"pointer",
                  border:act?"none":`1.5px solid ${T.border}`,
                  background:act?col.bg:"transparent",color:act?col.lt:T.muted,
                }}>{c}</button>
              );
            })}
          </div>

          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,color:T.faint,textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>
            {fLib.length} of {PLANTS.length} plants
          </div>

          {fLib.map(p=>{
            const k=`l${p.id}`;const isOpen=open[k];
            return(
              <div key={p.id} style={{background:T.surface,border:`2px solid ${T.border}`,borderRadius:10,marginBottom:8,overflow:"hidden",boxShadow:`2px 3px 0 ${T.border}44`}}>
                <button style={RB} onClick={()=>tog(k)}>
                  <div style={{display:"flex",alignItems:"center",padding:"11px 14px",gap:10}}>
                    <div style={{width:38,height:38,borderRadius:7,flexShrink:0,background:T.surface2,border:`2px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{getIcon(p.cat)}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:T.text,textTransform:"uppercase",letterSpacing:"0.02em",lineHeight:1.2}}>{p.name}</div>
                      <div style={{display:"flex",gap:5,marginTop:3,alignItems:"center",flexWrap:"wrap"}}>
                        <Badge cat={p.cat}/>
                        <span style={{fontSize:10,color:T.faint,fontStyle:"italic"}}>{p.latin}</span>
                      </div>
                    </div>
                    <div style={{fontSize:12,color:T.faint,transform:isOpen?"rotate(180deg)":"none",transition:"0.2s",flexShrink:0}}>▾</div>
                  </div>
                </button>
                {isOpen&&<DetailGrid plant={p}/>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Earthside));
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
